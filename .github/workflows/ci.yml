name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-class: [DeploymentServiceTest, DeploymentControllerTest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'zulu'
        cache: maven

    - name: Start backing services
      run: docker compose up -d mysql redis kafka

    - name: Wait for services to be healthy
      run: |
        echo "Waiting for services to become healthy..."
        sleep 15
        docker ps -a

    - name: Build with Maven and run specific test
      run: mvn clean test -Dtest=${{ matrix.test-class }}
